# Bitrix nginx config (nginx + php-fpm). Подробный разбор: tz/nginx.conf
# Файл монтируется в /etc/nginx/conf.d/default.conf (контекст http{}).

# Composite-кеш (опционально, выключен):
# map $request_method $_comp_method { default 0; GET 1; HEAD 1; }
# map $http_cookie    $_comp_anon   { default 1; "~*BITRIX_SM_LOGIN" 0; }

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root  /var/www/html;
    index index.php index.html;
    charset utf-8;
    client_max_body_size 1024m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    error_page 404 @bitrix;
    error_page 405 =200 @php;
    error_page 500 502 503 504 /500.html;
    location = /500.html { internal; }

    # security
    location ~ /\.(?!well-known)         { deny all; access_log off; log_not_found off; }
    location ~* /\.(ht|git|env)          { deny all; access_log off; log_not_found off; }
    location ~* (\.bak|\.sql|\.old|\.orig|\.swp)$ { deny all; access_log off; log_not_found off; }
    location ~* ^/(upload|bitrix/cache|bitrix/managed_cache|bitrix/html_pages)/.+\.(php|php3|php4|php5|phtml|pl|cgi|sh|py|asp)$ {
        deny all;
    }

    # static
    location ~* \.(jpg|jpeg|gif|png|ico|svg|webp|css|js|woff2?|ttf|eot|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @bitrix;
    }

    location ~ \.php$ {
        try_files $uri @bitrix;
        include       fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(.*)$;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SERVER_NAME     $host;
        fastcgi_param REMOTE_USER     $http_authorization;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    location @php {
        include       fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(.*)$;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
    }

    location @bitrix {
        include       fastcgi_params;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/bitrix/urlrewrite.php;
        fastcgi_param SERVER_NAME     $host;
        # fastcgi_param SCRIPT_FILENAME $document_root/bitrix/routing_index.php;
    }
}
