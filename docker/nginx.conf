server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50m;

    # --- Bitrix SEF routing (translates .htaccess rewrite rules) ---
    # Non-existent files → Bitrix urlrewrite engine
    location / {
        try_files $uri $uri/ /bitrix/urlrewrite.php$is_args$args;
    }

    # --- PHP handling ---
    location ~ \.php$ {
        try_files       $uri @bitrix;
        fastcgi_pass    php:9000;
        fastcgi_index   index.php;
        include         fastcgi_params;
        fastcgi_param   SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param   SERVER_NAME      $host;
        fastcgi_param   REMOTE_USER      $http_authorization;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # Fallback for php files that don't exist on disk → urlrewrite
    location @bitrix {
        fastcgi_pass    php:9000;
        include         fastcgi_params;
        fastcgi_param   SCRIPT_FILENAME  $document_root/bitrix/urlrewrite.php;
        fastcgi_param   SERVER_NAME      $host;
    }

    # --- Security: deny hidden files ---
    location ~ /\. { deny all; }

    # --- Security: no PHP execution in uploads ---
    location ~* ^/(upload|bitrix/cache|bitrix/managed_cache)/ {
        location ~ \.(php|php3|php4|php5|php6|phtml|pl|cgi|sh|py|asp)$ {
            deny all;
        }
    }

    # --- Static caching ---
    location ~* \.(jpg|jpeg|gif|png|ico|css|js|xml|svg|woff2?)$ {
        expires 3d;
        add_header Cache-Control "public, no-transform";
    }
}
