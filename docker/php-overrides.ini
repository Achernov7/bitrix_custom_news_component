; --- Bitrix PHP overrides ---
short_open_tag = On
display_errors = On
error_reporting = E_ALL & ~E_NOTICE & ~E_STRICT & ~E_DEPRECATED
log_errors = On

memory_limit = 512M
max_execution_time = 300
max_input_vars = 10000
max_input_time = 300

upload_max_filesize = 50M
post_max_size = 50M

; OPcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; Realpath cache (important for Bitrix's many includes)
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; dd() helper — disabled by default, enable with APP_DEBUG=1 env
auto_prepend_file = /opt/php-tools/dd-helper.php
