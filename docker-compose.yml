services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./standard_encode:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./standard_encode:/var/www/html
      - ./php-tools:/opt/php-tools
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./docker/php-overrides.ini:/usr/local/etc/php/conf.d/bitrix-overrides.ini
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
    depends_on:
      - db
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # ограничиваем память и вытесняем по LRU.
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: bitrix
      MYSQL_USER: bitrix
      MYSQL_PASSWORD: bitrix
      MYSQL_ROOT_PASSWORD: root1245
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
      - ./bitrix.sql:/docker-entrypoint-initdb.d/bitrix.sql:ro
    command:
      - --sql_mode=
      - --innodb_buffer_pool_size=512M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

volumes:
  docker-data:
